<main>
  <section class="section" style="padding-bottom:0;">
    <div class="container">
      <div class="section-head">
        <div class="eyebrow-line">Our Projects</div>
        <h2>Explore our games and prototypes</h2>
        <p>From early paper prototypes to games ready for the table — here's everything we're working on.</p>
      </div>

      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="released">Released</button>
        <button class="filter-btn" data-filter="development">In Development</button>
        <button class="filter-btn" data-filter="prototype">Prototypes</button>
      </div>
    </div>
  </section>

  <section class="section" style="padding-top:0;">
    <div class="container">
      <div class="project-grid" id="projectGrid"></div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    &copy; 2026 Ludical Studio. All rights reserved. &middot;
    <a href="https://facebook.com/ludical.studio" target="_blank" rel="noopener">Facebook</a> &middot;
    <a href="https://youtube.com/@ludicalstudio" target="_blank" rel="noopener">YouTube</a>
  </div>
</footer>

<script src="data/projects.js"></script>
<script src="js/script.js"></script>
<script>
(async () => {
  const data = await fetchProjects();
  const projects = data.projects;

  function renderProjectCardWithView(project) {
    const metaParts = [];
    if (project.players) metaParts.push('👥 ' + project.players);
    if (project.playtime) metaParts.push('⏱ ' + project.playtime);
    if (project.age) metaParts.push('🔞 Ages ' + project.age);

    const metaHtml = metaParts.length
      ? '<div class="meta-row">' + metaParts.map(m => '<span>' + m + '</span>').join('') + '</div>'
      : '';

    const customBtn = project.customButtonLabel && project.customButtonUrl
      ? '<a href="' + project.customButtonUrl + '" target="_blank" rel="noopener" class="btn btn-outline" style="margin-top:10px; padding:10px 20px; font-size:0.85rem;">' + project.customButtonLabel + '</a>'
      : '';

    const viewBtn = '<a href="project.html?id=' + project.id + '" class="btn btn-outline" style="margin-top:14px; padding:10px 20px; font-size:0.85rem;">View</a>';

    return `
      <div class="project-card" data-status="${project.status}" data-id="${project.id}">
        <div class="thumb" style="background:${project.coverGradient};">${project.coverImage ? '<img src="' + project.coverImage + '" alt="' + project.name + '" style="width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; border-radius:inherit;">' : ''}${!project.coverImage ? project.name : ''}</div>
        <div class="body">
          <span class="status-pill ${getStatusClass(project.status)}">${getStatusLabel(project.status)}</span>
          <h3>${project.name}</h3>
          <p class="desc">${project.description}</p>
          ${metaHtml}
          ${customBtn}
          ${viewBtn}
        </div>
      </div>
    `;
  }

  const grid = document.getElementById('projectGrid');
  if (projects.length) {
    grid.innerHTML = projects.map(renderProjectCardWithView).join('');
  }

  grid.innerHTML += `
    <div class="coming-soon" data-status="all">
      <div class="plus">+</div>
      More Coming Soon!
    </div>
  `;

  const filterBtns = document.querySelectorAll('.filter-btn');
  const cards = document.querySelectorAll('#projectGrid > [data-status]');

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filter = btn.dataset.filter;
      cards.forEach(card => {
        const status = card.dataset.status;
        const show = filter === 'all' || status === 'all' || status === filter;
        card.style.display = show ? '' : 'none';
      });
    });
  });
})();
</script>
</body>
</html>
